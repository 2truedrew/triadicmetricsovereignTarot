<!DOCTYPE html><html lang=en><head><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1.0"><title>Apperakadabra Weave</title>
<style>:root{--p:#6366f1}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,sans-serif;background:#0f0f1a;color:#e2e8f0;display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:1.5rem;text-align:center;padding:2rem}h1{font-size:2rem;background:linear-gradient(135deg,var(--p),#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}p{color:#94a3b8;font-size:1rem;max-width:300px}.cube{width:60px;height:60px;border:2px solid var(--p);border-radius:16px;animation:pulse 2s infinite;display:flex;align-items:center;justify-content:center;font-size:1.5rem}@keyframes pulse{0%,100%{box-shadow:0 0 20px rgba(99,102,241,.3)}50%{box-shadow:0 0 40px rgba(99,102,241,.6)}}</style></head>
<body><div class=cube>✦</div><h1>Apperakadabra Weave</h1><p>Import HTML files, weave them together, build APK</p></body></html>
